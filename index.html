<!DOCTYPE html>
<html>
<head>
<title>LMS Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h1 {
  text-align: center;
}

.topic {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  margin: 10px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.progress {
  text-align: center;
  margin: 15px 0;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Marketing Research LMS</h1>

<div class="progress" id="progressText"></div>

<div class="topic">
  <span>Topic 1</span>
  <button onclick="openTopic('topic1.html')">Start</button>
</div>

<div class="topic">
  <span>Topic 2</span>
  <button onclick="openTopic('topic2.html')">Start</button>
</div>

</div>

<script>
function openTopic(page) {
  window.location.href = page;
}

// load progress
let completed = JSON.parse(localStorage.getItem("completedTopics")) || [];

document.getElementById("progressText").innerText =
"Completed Topics: " + completed.length + " / 2";
</script>

</body>
</html>
