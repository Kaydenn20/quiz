<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 2 Quiz</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h1 {
  text-align: center;
}

.question {
  margin-bottom: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 10px;
}

label {
  display: block;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
<h1>Topic 2: Marketing Research</h1>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit</button>

<div id="result" class="result"></div>
</div>

<script>
const quizData = [
  {
    q: "11. A/an ____ and ____ identified and defined problem enables research to be properly conducted.",
    options: [
      "nicely, beautifully",
      "clearly, accurately",
      "worldly, theoretically",
      "empirically, economically"
    ],
    answer: 1
  },
  {
    q: "12. A good problem definition avoids unnecessary costs.",
    options: ["Yes", "No"],
    answer: 0
  },
  {
    q: "13. Which is NOT an important task in problem definition?",
    options: [
      "Search literature",
      "Discuss experts",
      "Doing qualitative research",
      "Reporting final research"
    ],
    answer: 3
  }
];

const quiz = document.getElementById("quiz");

quizData.forEach((item, i) => {
  let html = `<div class="question">
    <p>${item.q}</p>`;

  item.options.forEach((opt, j) => {
    html += `
      <label>
        <input type="radio" name="q${i}" value="${j}">
        ${opt}
      </label>
    `;
  });

  html += `</div>`;
  quiz.innerHTML += html;
});

function submitQuiz() {
  let score = 0;

  quizData.forEach((item, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (selected && parseInt(selected.value) === item.answer) {
      score++;
    }
  });

  document.getElementById("result").innerText =
    `Your Score: ${score} / ${quizData.length}`;
}
</script>

</body>
</html>
